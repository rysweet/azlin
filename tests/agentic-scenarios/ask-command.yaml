# Ask Command — Outside-in tests for azlin ask command
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Ask Command"
description: "Validates ask command works in both versions"
version: "1.0.0"
tags:
  - "ask"
  - "dual-parity"
  - "outside-in"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "ask help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ask --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "ask"
        - "Query"
        - "natural language"
    timeout: 10000

  - name: "ask help shows query argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ask --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "QUERY"
    timeout: 10000

  - name: "ask help shows resource-group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ask --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource-group"
    timeout: 10000

  - name: "ask help shows dry-run option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ask --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "dry-run"
    timeout: 10000

  - name: "ask help shows timeout option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ask --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "timeout"
    timeout: 10000

  - name: "ask help shows max-results option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ask --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "max-results"
    timeout: 10000
