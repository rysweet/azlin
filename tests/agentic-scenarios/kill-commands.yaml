# Kill Commands — Outside-in tests for azlin kill and help-killall
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.
# Note: "killall" cannot be invoked directly as a bash command due to tool
# restrictions, so we test it via "help killall" subcommand.

name: "Kill Commands"
description: "Validates kill and killall command help in both versions"
version: "1.0.0"
tags:
  - "kill"
  - "dual-parity"
  - "outside-in"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "kill help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} kill --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Delete"
        - "VM"
        - "force"
    timeout: 10000

  - name: "kill help shows vm-name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} kill --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "VM_NAME"
    timeout: 10000

  - name: "kill help shows resource-group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} kill --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource-group"
    timeout: 10000

  - name: "kill help shows force option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} kill --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "force"
        - "confirmation"
    timeout: 10000

  - name: "kill requires vm name"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} kill 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "help killall shows description"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} help killall"
    expect:
      exit_code: 0
      stdout_contains:
        - "Delete all"
        - "resource group"
    timeout: 10000
