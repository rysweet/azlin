# Env Commands — Outside-in tests for env subcommands
# Works with BOTH Python and Rust versions.
# Validates env help text lists all shared subcommands.

name: "Env Commands"
description: "Validates env subcommand help text and options for both versions"
version: "2.0.0"
tags:
  - "env"
  - "parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Env help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "Env help lists set subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "set"
    timeout: 10000

  - name: "Env help lists list subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
    timeout: 10000

  - name: "Env help lists delete subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "delete"
    timeout: 10000

  - name: "Env help lists export subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "export"
    timeout: 10000

  - name: "Env help lists import subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "import"
    timeout: 10000

  - name: "Env help lists clear subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "clear"
    timeout: 10000

  - name: "Env set --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env set --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000
