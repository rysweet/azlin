# Costs Commands — Validates cost intelligence and optimization commands
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Costs Commands"
description: "Validates costs dashboard/history/budget/recommend/actions help"
version: "2.0.0"
tags:
  - "costs"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "costs top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "costs"
        - "Usage"
    timeout: 10000

  - name: "costs dashboard help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs dashboard --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "dashboard"
        - "Usage"
    timeout: 10000

  - name: "costs history help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs history --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "history"
        - "Usage"
    timeout: 10000

  - name: "costs budget help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs budget --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "budget"
        - "Usage"
    timeout: 10000

  - name: "costs recommend help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs recommend --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "recommend"
        - "Usage"
    timeout: 10000

  - name: "costs actions help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs actions --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "actions"
        - "Usage"
    timeout: 10000

  - name: "costs dashboard requires resource-group"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs dashboard --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource-group"
    timeout: 10000

  - name: "costs history has days option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs history --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "days"
    timeout: 10000
