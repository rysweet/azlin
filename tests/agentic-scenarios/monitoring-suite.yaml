# Monitoring Suite — health, logs, cost, w, ps, top command validation
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Tests help text, subcommand options, and argument validation for monitoring commands.

name: "Monitoring Suite"
description: "Validates monitoring commands: health, logs, cost, w, ps, top help and options"
version: "2.0.0"
tags:
  - "monitoring"
  - "health"
  - "logs"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "health help shows usage and options"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} health --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
        - "health"
    timeout: 10000

  - name: "health help mentions resource group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} health --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource"
    timeout: 10000

  - name: "health help mentions vm option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} health --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "vm"
    timeout: 10000

  - name: "logs help shows usage and options"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} logs --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
        - "logs"
    timeout: 10000

  - name: "logs help mentions log types"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} logs --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "cloud-init"
        - "syslog"
        - "auth"
    timeout: 10000

  - name: "logs help mentions follow option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} logs --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "follow"
    timeout: 10000

  - name: "logs help mentions lines option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} logs --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "lines"
    timeout: 10000

  - name: "logs requires vm argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} logs 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "cost help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} cost --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
        - "cost"
    timeout: 10000

  - name: "w help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} w --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "ps help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} ps --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "top help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} top --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "costs help shows usage and subcommands"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
        - "costs"
    timeout: 10000

  - name: "health completes without panic on missing Azure"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "OUT=$(${AZLIN_BIN:-azlin} health 2>&1); echo \"$OUT\" | grep -qi 'panic\\|thread.*panicked' && echo PANIC || echo NO_PANIC"
    expect:
      exit_code: 0
      stdout_contains:
        - "NO_PANIC"
    timeout: 30000
