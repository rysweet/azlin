# Config Workflow — End-to-end configuration management (Rust-only)
# Python does NOT have a `config` subcommand.
# Tests the full config set/get/show lifecycle.

name: "Config Workflow"
description: "End-to-end configuration management (Rust-only)"
version: "2.0.0"
tags:
  - "config"
  - "workflow"
  - "rust-only"
  - "outside-in"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Show default config"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config show"
    expect:
      exit_code: 0
      stdout_contains:
        - "default_region"
    timeout: 10000

  - name: "Set a config value"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config set default_region westus3"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "Get the value back"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config get default_region"
    expect:
      exit_code: 0
      stdout_contains:
        - "westus3"
    timeout: 10000

  - name: "Config show reflects change"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config show"
    expect:
      exit_code: 0
      stdout_contains:
        - "westus3"
    timeout: 10000

  - name: "Reset to default"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config set default_region eastus2"
    expect:
      exit_code: 0
    timeout: 10000
