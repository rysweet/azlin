# Session Commands — Validates session management commands
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Session Commands"
description: "Validates session save/list/load/delete commands work in both Python and Rust"
version: "2.0.0"
tags:
  - "sessions"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "sessions top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "sessions"
        - "Usage"
    timeout: 10000

  - name: "sessions save help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions save --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "save"
        - "Usage"
    timeout: 10000

  - name: "sessions list help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions list --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
        - "Usage"
    timeout: 10000

  - name: "sessions load help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions load --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "load"
        - "Usage"
    timeout: 10000

  - name: "sessions delete help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions delete --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "delete"
        - "Usage"
    timeout: 10000

  - name: "sessions save requires name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions save 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "sessions load requires name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions load 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000
