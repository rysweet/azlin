# Config CRUD Operations — Tests actual config set/get/show operations
# Rust-only: Python does NOT have a config subcommand.
# Exercises real config mutations and verifies round-trip consistency.

name: "Config CRUD Operations"
description: "Tests actual config set/get/show operations (Rust only)"
version: "2.0.0"
tags:
  - "config"
  - "crud"
  - "rust-only"
  - "functional"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "show default config returns key-value pairs"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config show 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "default_region"
        - "default_resource_group"
    timeout: 10000

  - name: "set config value for default_resource_group"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config set default_resource_group test-rg-agentic 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Set default_resource_group"
        - "test-rg-agentic"
    timeout: 10000

  - name: "get config value back matches what was set"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config get default_resource_group 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "test-rg-agentic"
    timeout: 10000

  - name: "set config value for default_region"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config set default_region eastus2 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Set default_region"
        - "eastus2"
    timeout: 10000

  - name: "get default_region reflects new value"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config get default_region 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "eastus2"
    timeout: 10000

  - name: "config show reflects both changes"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config show 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "test-rg-agentic"
        - "eastus2"
    timeout: 10000

  - name: "set invalid config key fails with error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "! ${AZLIN_BIN:-azlin} config set invalid_key_xyz value 2>&1"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "restore default_resource_group"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config set default_resource_group azlin-rg 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Set default_resource_group"
    timeout: 10000

  - name: "restore default_region"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config set default_region westus2 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Set default_region"
    timeout: 10000
