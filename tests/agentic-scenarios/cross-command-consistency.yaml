# Cross-Command Consistency — Validates consistent behavior across command groups
# Works with BOTH Python and Rust versions.
# Each group command should list its subcommands in help output.

name: "Cross-Command Consistency"
description: "Validates consistent behavior across all command groups"
version: "2.0.0"
tags:
  - "consistency"
  - "coverage"
  - "outside-in"
  - "dual-version"

config:
  timeout: 120000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "env subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "set"
        - "list"
        - "delete"
    timeout: 10000

  - name: "snapshot subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "create"
        - "list"
        - "restore"
    timeout: 10000

  - name: "storage subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "create"
        - "list"
        - "delete"
    timeout: 10000

  - name: "batch subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "start"
        - "stop"
    timeout: 10000

  - name: "fleet subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "run"
    timeout: 10000

  - name: "costs subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} costs --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "dashboard"
        - "history"
    timeout: 10000

  - name: "disk subcommands listed"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} disk --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "add"
    timeout: 10000

  - name: "All commands show version"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --version"
    expect:
      exit_code: 0
      stdout_contains:
        - "azlin"
    timeout: 10000
