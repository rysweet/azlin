# Context Commands — Validates multi-subscription context management
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Context Commands"
description: "Validates context list/show/create/switch/delete/rename commands"
version: "2.0.0"
tags:
  - "context"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "context top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "context"
        - "Usage"
    timeout: 10000

  - name: "context list help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context list --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
        - "Usage"
    timeout: 10000

  - name: "context show help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context show --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "show"
        - "Usage"
    timeout: 10000

  - name: "context create help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context create --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "create"
        - "Usage"
    timeout: 10000

  - name: "context switch help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context switch --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "switch"
        - "Usage"
    timeout: 10000

  - name: "context delete help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context delete --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "delete"
        - "Usage"
    timeout: 10000

  - name: "context rename help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context rename --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "rename"
        - "Usage"
    timeout: 10000

  - name: "context create requires name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context create 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "context rename requires two arguments"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context rename 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000
