# Disk Commands — Validates VM data disk management
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Disk Commands"
description: "Validates disk add help text"
version: "2.0.0"
tags:
  - "disk"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "disk top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} disk --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "disk"
        - "Usage"
    timeout: 10000

  - name: "disk add help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} disk add --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "add"
        - "Usage"
    timeout: 10000

  - name: "disk add has size option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} disk add --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "size"
    timeout: 10000

  - name: "disk add has sku option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} disk add --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "sku"
    timeout: 10000

  - name: "disk add requires vm name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} disk add 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000
