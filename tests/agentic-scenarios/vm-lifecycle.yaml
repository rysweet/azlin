# VM Lifecycle — Outside-in tests for VM lifecycle commands
# Works with BOTH Python and Rust versions.
# Tests help text for new, start, stop, destroy, connect commands.
# Does NOT test actual VM operations (requires Azure auth).

name: "VM Lifecycle"
description: "Validates VM lifecycle command help text for both Python and Rust versions"
version: "2.0.0"
tags:
  - "vm"
  - "lifecycle"
  - "parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "new --help exits 0 and shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} new --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "start --help shows VM name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} start --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "start --help shows resource-group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} start --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource-group"
    timeout: 10000

  - name: "stop --help shows deallocate option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} stop --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "deallocate"
    timeout: 10000

  - name: "stop --help shows resource-group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} stop --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource-group"
    timeout: 10000

  - name: "connect --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} connect --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "destroy --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} destroy --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "clone --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} clone --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "start with no args shows error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} start 2>&1; echo DONE"
    expect:
      exit_code: 0
      stdout_contains:
        - "DONE"
    timeout: 10000

  - name: "stop with no args shows error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} stop 2>&1; echo DONE"
    expect:
      exit_code: 0
      stdout_contains:
        - "DONE"
    timeout: 10000
