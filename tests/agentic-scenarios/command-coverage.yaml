# Command Coverage — Comprehensive --help test for every major command
# Tests commands that exist in BOTH Python and Rust versions.
# Each command must respond to --help with exit 0.

name: "Command Coverage"
description: "Validates all shared commands respond to --help with exit 0 in both versions"
version: "2.0.0"
tags:
  - "coverage"
  - "help"
  - "outside-in"
  - "dual-version"

config:
  timeout: 120000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "list --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} list --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "start --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} start --help"
