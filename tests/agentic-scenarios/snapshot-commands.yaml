# Snapshot Commands — Outside-in tests for snapshot subcommands
# Works with BOTH Python and Rust versions.
# Validates snapshot help text and subcommand availability.

name: "Snapshot Commands"
description: "Validates snapshot subcommand help text and argument handling for both versions"
version: "2.0.0"
tags:
  - "snapshot"
  - "parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Snapshot help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "Snapshot help lists create subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "create"
    timeout: 10000

  - name: "Snapshot help lists list subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
    timeout: 10000

  - name: "Snapshot help lists restore subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "restore"
    timeout: 10000

  - name: "Snapshot help lists delete subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "delete"
    timeout: 10000

  - name: "Snapshot create --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot create --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "Snapshot list --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} snapshot list --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000
