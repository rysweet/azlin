# Template Lifecycle — End-to-end template create, list, show, delete, export, import
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Tests help text, argument validation, and subcommand structure.

name: "Template Lifecycle"
description: "Full template lifecycle: create, list, show, delete, export, import help and argument validation"
version: "2.0.0"
tags:
  - "templates"
  - "lifecycle"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "template help lists all subcommands"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "create"
        - "list"
        - "delete"
    timeout: 10000

  - name: "template help mentions export and import"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "export"
        - "import"
    timeout: 10000

  - name: "template create help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template create --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template create requires name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template create 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "template list help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template list runs without error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "template show help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template show --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template show requires name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template show 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "template show nonexistent template fails gracefully"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "OUT=$(${AZLIN_BIN:-azlin} template show nonexistent-tmpl-xyz 2>&1); echo \"$OUT\" | grep -qi 'panic\\|thread.*panicked' && echo PANIC || echo NO_PANIC"
    expect:
      exit_code: 0
      stdout_contains:
        - "NO_PANIC"
    timeout: 10000

  - name: "template delete help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template delete --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template delete requires name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template delete 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "template delete nonexistent template fails gracefully"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "OUT=$(${AZLIN_BIN:-azlin} template delete nonexistent-tmpl-xyz 2>&1); echo \"$OUT\" | grep -qi 'panic\\|thread.*panicked' && echo PANIC || echo NO_PANIC"
    expect:
      exit_code: 0
      stdout_contains:
        - "NO_PANIC"
    timeout: 10000

  - name: "template export help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template export --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template import help shows usage"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template import --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template import with nonexistent file fails gracefully"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "OUT=$(${AZLIN_BIN:-azlin} template import /tmp/does-not-exist-xyz.yaml 2>&1); echo \"$OUT\" | grep -qi 'panic\\|thread.*panicked' && echo PANIC || echo NO_PANIC"
    expect:
      exit_code: 0
      stdout_contains:
        - "NO_PANIC"
    timeout: 10000
