# Error Handling — Test error behavior for invalid input
# Works with BOTH Python and Rust versions.
# Validates unknown commands, missing arguments, and error output.
# Avoids version-specific features (config subcommand is Rust-only).

name: "Error Handling"
description: "Validates error output for unknown commands and missing arguments in both versions"
version: "2.0.0"
tags:
  - "errors"
  - "validation"
  - "outside-in"
  - "dual-version"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Unknown command produces error output"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} nonexistent-command 2>&1; echo EXIT_CODE:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT_CODE:"
    timeout: 10000

  - name: "Unknown command exits non-zero"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "! ${AZLIN_BIN:-azlin} nonexistent-command 2>/dev/null"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "start with no args produces error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} start 2>&1; echo EXIT_CODE:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT_CODE:"
    timeout: 10000

  - name: "start with no args exits non-zero"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "! ${AZLIN_BIN:-azlin} start 2>/dev/null"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "stop with no args produces error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} stop 2>&1; echo EXIT_CODE:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT_CODE:"
    timeout: 10000

  - name: "destroy with no args produces error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} destroy 2>&1; echo EXIT_CODE:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT_CODE:"
    timeout: 10000

  - name: "No arguments shows usage text"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} 2>&1 || true"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "Invalid flag shows error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --not-a-real-flag 2>&1; echo EXIT_CODE:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT_CODE:"
    timeout: 10000
