# Keys Commands — Validates SSH key management commands
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Keys Commands"
description: "Validates keys rotate/list/export/backup help text"
version: "2.0.0"
tags:
  - "keys"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "keys top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} keys --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "keys"
        - "Usage"
    timeout: 10000

  - name: "keys rotate help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} keys rotate --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "rotate"
        - "Usage"
    timeout: 10000

  - name: "keys list help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} keys list --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
        - "Usage"
    timeout: 10000

  - name: "keys export help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} keys export --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "export"
        - "Usage"
    timeout: 10000

  - name: "keys backup help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} keys backup --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "backup"
        - "Usage"
    timeout: 10000

  - name: "keys export requires output option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} keys export --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "output"
    timeout: 10000
