# Help Parity — Comprehensive help text parity check
# Validates that help text in BOTH Python and Rust mentions the same commands.
# Tests 20+ commands that appear in top-level help for both versions.

name: "Help Parity"
description: "Validates all major commands appear in --help output for both versions"
version: "2.0.0"
tags:
  - "help"
  - "parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Top-level help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "Help includes list command"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
    timeout: 10000

  - name: "Help includes connect command"
