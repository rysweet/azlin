# Shell Completions Functional — Verify completions produce valid shell scripts
# Rust-only: Python does NOT have a completions subcommand.
# Validates actual shell script content, not just exit codes.

name: "Shell Completions Output"
description: "Verify completions produce valid shell scripts (Rust only)"
version: "2.0.0"
tags:
  - "completions"
  - "functional"
  - "rust-only"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "bash completions contain complete command"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions bash 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "_azlin"
        - "COMPREPLY"
    timeout: 10000

  - name: "bash completions are valid bash syntax"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions bash 2>/dev/null | bash -n 2>&1; echo SYNTAX_CHECK:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "SYNTAX_CHECK:0"
    timeout: 10000

  - name: "zsh completions contain compdef"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions zsh 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "compdef"
    timeout: 10000

  - name: "fish completions contain complete command"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions fish 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "complete"
        - "azlin"
    timeout: 10000

  - name: "bash completions reference real subcommands"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions bash 2>&1 | grep -c 'start\\|stop\\|list\\|connect\\|config'"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "completions output is non-trivial (more than 10 lines)"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "LINES=$(${AZLIN_BIN:-azlin} completions bash 2>/dev/null | wc -l); test $LINES -gt 10 && echo PASS:${LINES}_lines || echo FAIL:${LINES}_lines"
    expect:
      exit_code: 0
      stdout_contains:
        - "PASS:"
    timeout: 10000
