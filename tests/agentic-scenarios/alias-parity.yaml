# Alias Parity — Validates command aliases map to correct behavior
# Works with BOTH Python and Rust versions.
# Verifies that aliases accept the same options as their primary commands.

name: "Command Aliases"
description: "Validates command aliases map to correct behavior"
version: "2.0.0"
tags:
  - "aliases"
  - "parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "create alias exists and shows help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} create --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "create shares options with new"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "diff <(${AZLIN_BIN:-azlin} create --help 2>&1 | grep -oE '\\-\\-[a-z][-a-z]*' | sort) <(${AZLIN_BIN:-azlin} new --help 2>&1 | grep -oE '\\-\\-[a-z][-a-z]*' | sort); echo DIFF:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "DIFF:"
    timeout: 10000

  - name: "vm alias exists and shows help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} vm --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "vm shares options with new"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "diff <(${AZLIN_BIN:-azlin} vm --help 2>&1 | grep -oE '\\-\\-[a-z][-a-z]*' | sort) <(${AZLIN_BIN:-azlin} new --help 2>&1 | grep -oE '\\-\\-[a-z][-a-z]*' | sort); echo DIFF:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "DIFF:"
    timeout: 10000

  - name: "prune alias exists and shows help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} prune --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "prune shares options with cleanup"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "diff <(${AZLIN_BIN:-azlin} prune --help 2>&1 | grep -oE '\\-\\-[a-z][-a-z]*' | sort) <(${AZLIN_BIN:-azlin} cleanup --help 2>&1 | grep -oE '\\-\\-[a-z][-a-z]*' | sort); echo DIFF:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "DIFF:"
    timeout: 10000
