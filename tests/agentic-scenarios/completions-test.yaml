# Shell Completions — Validates shell completion generation (Rust-only)
# Python does NOT have a `completions` subcommand.
# Tests bash, zsh, and fish completion output.

name: "Shell Completions"
description: "Validates shell completion generation for all supported shells (Rust-only)"
version: "2.0.0"
tags:
  - "completions"
  - "rust-only"
  - "outside-in"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Bash completions"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions bash 2>/dev/null | head -5"
    expect:
      exit_code: 0
      stdout_contains:
        - "_azlin"
    timeout: 10000

  - name: "Zsh completions"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions zsh 2>/dev/null | head -5"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "Fish completions"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} completions fish 2>/dev/null | head -5"
    expect:
      exit_code: 0
    timeout: 10000
