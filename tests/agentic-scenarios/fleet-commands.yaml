# Fleet Commands — Validates fleet-wide command execution
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Fleet Commands"
description: "Validates fleet run/workflow help text"
version: "2.0.0"
tags:
  - "fleet"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "fleet top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "fleet"
        - "Usage"
    timeout: 10000

  - name: "fleet run help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet run --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "run"
        - "Usage"
    timeout: 10000

  - name: "fleet workflow help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet workflow --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "workflow"
        - "Usage"
    timeout: 10000

  - name: "fleet run has tag filter option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet run --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "tag"
    timeout: 10000

  - name: "fleet run requires command argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet run 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "fleet workflow requires file argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} fleet workflow 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000
