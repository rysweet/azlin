# Batch Commands — Validates batch operations on multiple VMs
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Batch Commands"
description: "Validates batch stop/start/command help text and flags"
version: "2.0.0"
tags:
  - "batch"
  - "dual-parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "batch top-level help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "batch"
        - "Usage"
    timeout: 10000

  - name: "batch stop help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch stop --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "stop"
        - "Usage"
    timeout: 10000

  - name: "batch start help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch start --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "start"
        - "Usage"
    timeout: 10000

  - name: "batch command help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch command --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "command"
        - "Usage"
    timeout: 10000

  - name: "batch stop has tag filter option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch stop --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "tag"
    timeout: 10000

  - name: "batch start has all flag"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch start --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "all"
    timeout: 10000

  - name: "batch command requires command argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} batch command 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000
