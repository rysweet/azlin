# Error Resilience — CLI handles errors gracefully without panicking
# Works with BOTH Python and Rust versions.
# Verifies no panics, graceful error output, and stability under load.

name: "Error Resilience"
description: "CLI handles errors gracefully without panicking under various conditions"
version: "2.0.0"
tags:
  - "errors"
  - "resilience"
  - "outside-in"
  - "dual-version"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "List without Azure auth"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} list --resource-group nonexistent 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "Start nonexistent VM"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} start nonexistent-vm-12345 2>&1; echo DONE"
    expect:
      exit_code: 0
      stdout_contains:
        - "DONE"
    timeout: 10000

  - name: "Multiple rapid help calls"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "for i in 1 2 3 4 5; do ${AZLIN_BIN:-azlin} --help > /dev/null 2>&1; done; echo DONE"
    expect:
      exit_code: 0
      stdout_contains:
        - "DONE"
    timeout: 10000

  - name: "No stdout to terminal (piped)"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --version 2>&1 | cat"
    expect:
      exit_code: 0
      stdout_contains:
        - "azlin"
    timeout: 10000

  - name: "Empty args error message"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} env set 2>&1; echo DONE"
    expect:
      exit_code: 0
      stdout_contains:
        - "DONE"
    timeout: 10000
