# Output Format Functional — Verify --output flag is accepted by commands
# Rust-only: Python does not support --output flag.
# Tests that --output json/table flags are handled, not just ignored.

name: "Output Format Flags"
description: "Verify --output json/table flags work on commands (Rust only)"
version: "2.0.0"
tags:
  - "output"
  - "format"
  - "rust-only"
  - "functional"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "global output flag is accepted"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --output json --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "template list with json output succeeds"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list --output json 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "template list with table output succeeds"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list --output table 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "config show output is parseable key-value"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "LINES=$(${AZLIN_BIN:-azlin} config show 2>&1 | grep -c ':'); test $LINES -gt 5 && echo PARSEABLE:$LINES || echo FAIL:$LINES"
    expect:
      exit_code: 0
      stdout_contains:
        - "PARSEABLE:"
    timeout: 10000

  - name: "version output is single-line parseable"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "LINES=$(${AZLIN_BIN:-azlin} --version 2>&1 | wc -l); test $LINES -le 2 && echo SINGLE_LINE:$LINES || echo MULTI_LINE:$LINES"
    expect:
      exit_code: 0
      stdout_contains:
        - "SINGLE_LINE:"
    timeout: 10000
