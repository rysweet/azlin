# Output Formats — Test --output json, --output csv, --output table for various commands
# Rust-only: Python does not support --output flag.
# Validates that output format flags are accepted and produce correctly structured output.

name: "Output Formats"
description: "Validates --output json/csv/table flags produce correct output for various commands"
version: "2.0.0"
tags:
  - "output"
  - "format"
  - "rust-only"
  - "functional"

config:
  timeout: 60000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "global help mentions output format option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --help 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "output"
    timeout: 10000

  - name: "template list with --output json exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list --output json 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "template list with --output csv exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list --output csv 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "template list with --output table exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} template list --output table 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "sessions list with --output json exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions list --output json 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "sessions list with --output csv exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions list --output csv 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "sessions list with --output table exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sessions list --output table 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "context list with --output json exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context list --output json 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "context list with --output csv exits cleanly"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} context list --output csv 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:0"
    timeout: 10000

  - name: "config show is parseable key-value format"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "LINES=$(${AZLIN_BIN:-azlin} config show 2>&1 | grep -c ':'); test $LINES -ge 3 && echo PARSEABLE:$LINES || echo FAIL:$LINES"
    expect:
      exit_code: 0
      stdout_contains:
        - "PARSEABLE:"
    timeout: 10000

  - name: "version output is single line"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "LINES=$(${AZLIN_BIN:-azlin} --version 2>&1 | wc -l); test $LINES -le 2 && echo SINGLE_LINE:$LINES || echo MULTI_LINE:$LINES"
    expect:
      exit_code: 0
      stdout_contains:
        - "SINGLE_LINE:"
    timeout: 10000

  - name: "invalid output format is rejected"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "! ${AZLIN_BIN:-azlin} template list --output yaml 2>/dev/null"
    expect:
      exit_code: 0
    timeout: 10000

  - name: "json output from template list is valid JSON or empty"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "OUT=$(${AZLIN_BIN:-azlin} template list --output json 2>&1); if [ -z \"$OUT\" ] || echo \"$OUT\" | python3 -m json.tool > /dev/null 2>&1; then echo VALID_JSON; else echo INVALID_JSON; fi"
    expect:
      exit_code: 0
      stdout_contains:
        - "VALID_JSON"
    timeout: 10000

  - name: "csv output from sessions list contains no JSON brackets"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "OUT=$(${AZLIN_BIN:-azlin} sessions list --output csv 2>&1); echo \"$OUT\" | grep -q '^\\[' && echo HAS_JSON_BRACKETS || echo CSV_OK"
    expect:
      exit_code: 0
      stdout_contains:
        - "CSV_OK"
    timeout: 10000
