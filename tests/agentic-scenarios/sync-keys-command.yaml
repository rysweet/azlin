# Sync-Keys Command — Outside-in tests for azlin sync-keys command
# Works with BOTH Python (uv run azlin) and Rust (./rust/target/debug/azlin).
# Set AZLIN_BIN env var to switch versions.

name: "Sync-Keys Command"
description: "Validates sync-keys command works in both versions"
version: "1.0.0"
tags:
  - "sync-keys"
  - "dual-parity"
  - "outside-in"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "sync-keys help"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sync-keys --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "sync"
        - "SSH"
        - "authorized_keys"
    timeout: 10000

  - name: "sync-keys help shows vm-name argument"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sync-keys --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "VM_NAME"
    timeout: 10000

  - name: "sync-keys help shows resource-group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sync-keys --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource-group"
    timeout: 10000

  - name: "sync-keys help shows ssh-user option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sync-keys --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "ssh-user"
    timeout: 10000

  - name: "sync-keys help shows timeout option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sync-keys --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "timeout"
    timeout: 10000

  - name: "sync-keys requires vm name"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} sync-keys 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000
