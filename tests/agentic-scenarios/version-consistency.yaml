# Version Consistency — Verify version is consistent across all version-reporting commands
# Works with BOTH Python and Rust versions.
# Tests that --version flag and version subcommand report the same version.

name: "Version Consistency"
description: "Verify version is consistent across all version-reporting commands"
version: "2.0.0"
tags:
  - "version"
  - "consistency"
  - "functional"
  - "dual-version"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "version command outputs 2.3.0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} version 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "2.3.0"
    timeout: 10000

  - name: "version flag outputs 2.3.0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --version 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "2.3.0"
    timeout: 10000

  - name: "version command and flag report same version string"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "VER_CMD=$(${AZLIN_BIN:-azlin} --version 2>&1 | grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+'); VER_SUB=$(${AZLIN_BIN:-azlin} version 2>&1 | grep -oE '[0-9]+\\.[0-9]+\\.[0-9]+'); test \"$VER_CMD\" = \"$VER_SUB\" && echo MATCH:$VER_CMD || echo MISMATCH:$VER_CMD:$VER_SUB"
    expect:
      exit_code: 0
      stdout_contains:
        - "MATCH:"
    timeout: 10000

  - name: "version output contains azlin name"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --version 2>&1"
    expect:
      exit_code: 0
      stdout_contains:
        - "azlin"
    timeout: 10000
