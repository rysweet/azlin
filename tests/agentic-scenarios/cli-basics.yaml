# CLI Basics — Outside-in tests for azlin CLI fundamentals
# These tests validate BOTH Python and Rust versions produce correct output.
# Each test uses the AZLIN_BIN env var to switch between versions.

name: "CLI Basics"
description: "Validates CLI help, version, and config commands work correctly"
version: "1.0.0"
tags:
  - "cli"
  - "basics"
  - "parity"
  - "outside-in"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Help text includes key commands"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
        - "connect"
        - "start"
        - "stop"
        - "help"
    timeout: 10000

  - name: "Version flag works"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} --version"
    expect:
      exit_code: 0
      stdout_contains:
        - "azlin"
    timeout: 10000

  - name: "Config show returns valid TOML"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} config show"
    expect:
      exit_code: 0
      stdout_contains:
        - "default_region"
    timeout: 10000

  - name: "Invalid command shows error"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} nonexistent-command 2>&1; echo EXIT:$?"
    expect:
      exit_code: 0
      stdout_contains:
        - "EXIT:"
    timeout: 10000

  - name: "List help shows resource group option"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} list --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "resource"
    timeout: 10000
