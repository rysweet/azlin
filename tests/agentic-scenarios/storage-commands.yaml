# Storage Commands — Outside-in tests for storage subcommands
# Works with BOTH Python and Rust versions.
# Validates storage help text and shared subcommand availability.

name: "Storage Commands"
description: "Validates storage subcommand help text and options for both versions"
version: "2.0.0"
tags:
  - "storage"
  - "parity"
  - "outside-in"
  - "dual-version"

config:
  timeout: 30000
  retries: 1
  parallel: false

agents:
  - name: "cli-runner"
    type: "system"
    config:
      shell: "bash"
      timeout: 15000
      capture_output: true

steps:
  - name: "Storage help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000

  - name: "Storage help lists create subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "create"
    timeout: 10000

  - name: "Storage help lists list subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "list"
    timeout: 10000

  - name: "Storage help lists mount subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "mount"
    timeout: 10000

  - name: "Storage help lists unmount subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "unmount"
    timeout: 10000

  - name: "Storage help lists delete subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "delete"
    timeout: 10000

  - name: "Storage help lists status subcommand"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "status"
    timeout: 10000

  - name: "Storage create --help exits 0"
    agent: "cli-runner"
    action: "execute_command"
    params:
      command: "${AZLIN_BIN:-azlin} storage create --help"
    expect:
      exit_code: 0
      stdout_contains:
        - "Usage"
    timeout: 10000
