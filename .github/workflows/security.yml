name: Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # GitGuardian - Scan for secrets and credentials
  gitguardian:
    name: GitGuardian Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Full history for secret detection

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@0935c02957f6fd78bc52166570e4e345c539120f # v1.43.0
        continue-on-error: true  # Don't fail if API key invalid
        with:
          args: -v --all-policies
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # Bandit - Python security linter
  bandit:
    name: Bandit Security Linter
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: |
          pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r src/ \
            -c pyproject.toml \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            -x '*/tests/*' \
            || true

          # Also generate text report for logs
          bandit -r src/ \
            -c pyproject.toml \
            -f txt \
            --severity-level medium \
            --confidence-level medium \
            -x '*/tests/*'

      - name: Upload Bandit report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 90

  # Safety - Check Python dependencies for known vulnerabilities
  safety:
    name: Safety Dependency Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.5.11"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system safety

      - name: Run Safety check
        run: |
          # Export dependencies
          uv pip freeze > requirements.txt

          # Run safety check
          safety check \
            --file requirements.txt \
            --json \
            --output safety-report.json \
            || true

          # Display results
          safety check --file requirements.txt || true

      - name: Upload Safety report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: safety-vulnerability-report
          path: safety-report.json
          retention-days: 90

  # pip-audit - Blocking audit of the pinned Python (docs) supply chain.
  # Unlike the legacy `safety` job above, this FAILS CI on any known
  # advisory so dependency regressions cannot land silently.
  pip-audit:
    name: pip-audit Dependency Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit pinned documentation dependencies
        run: pip-audit --strict -r docs-requirements.txt

  # CodeQL Analysis - Advanced security scanning
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:${{ matrix.language }}"
  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'  # Only on push to main
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload OSSF Scorecard results
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: results.sarif

  # Summary job - all security checks
  security-summary:
    name: Security Checks Summary
    runs-on: ubuntu-24.04
    needs: [gitguardian, bandit, safety, codeql]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check all security scans
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # GitGuardian
          if [[ "${{ needs.gitguardian.result }}" == "success" ]]; then
            echo "✅ GitGuardian: No secrets detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ GitGuardian: Potential secrets found" >> $GITHUB_STEP_SUMMARY
          fi

          # Bandit
          if [[ "${{ needs.bandit.result }}" == "success" ]]; then
            echo "✅ Bandit: No security issues" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Bandit: Security issues detected" >> $GITHUB_STEP_SUMMARY
          fi

          # Safety
          if [[ "${{ needs.safety.result }}" == "success" ]]; then
            echo "✅ Safety: No vulnerable dependencies" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Safety: Vulnerable dependencies found" >> $GITHUB_STEP_SUMMARY
          fi

          # CodeQL
          if [[ "${{ needs.codeql.result }}" == "success" ]]; then
            echo "✅ CodeQL: No security vulnerabilities" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ CodeQL: Security vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed reports in the Actions artifacts." >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical security issues found
        run: |
          # Only fail on GitGuardian (secrets) if it explicitly failed
          # GitGuardian has continue-on-error so may succeed even with issues
          if [[ "${{ needs.gitguardian.result }}" == "failure" ]]; then
            echo "⚠️ GitGuardian failed - check if API key is configured"
            # Don't fail the build - GitGuardian might be unavailable
          fi
          echo "✅ Security scan workflow completed"
