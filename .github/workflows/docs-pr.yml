name: Documentation Preview

on:
  pull_request:
    paths:
      - 'docs-site/**'
      - 'mkdocs.yml'
      - 'scripts/extract_help.py'
      - '.github/workflows/docs-pr.yml'

permissions: {}

jobs:
  # Build docs for PR preview
  build-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Pinned, pip-audited toolchain — see docs-requirements.txt.
          pip install -r docs-requirements.txt

      - name: Generate command documentation
        run: |
          python scripts/extract_help.py --output docs-site/commands/ --mock
        continue-on-error: true

      - name: Build documentation
        run: |
          # docs_dir is already set to docs-site in mkdocs.yml
          # Note: Not using --strict for PR previews to allow existing doc warnings
          mkdocs build

      - name: Upload preview
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docs-preview
          path: site/
          retention-days: 7

      - name: Comment on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        continue-on-error: true  # Don't fail the build if commenting fails due to permissions
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Documentation preview built successfully! Download the artifact to view locally.'
            })
