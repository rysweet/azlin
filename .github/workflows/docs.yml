name: Deploy Documentation

on:
  # Deploy on pushes to main branch
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - 'mkdocs.yml'
      - 'scripts/doc_sync.py'
      - 'scripts/cli_documentation/**'
      - '.github/workflows/docs.yml'

  # Allow manual deployment
  workflow_dispatch:

# Least-privilege default: no token scopes unless a job opts in below.
permissions: {}

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build documentation
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install MkDocs and dependencies
        run: |
          # Pinned, pip-audited toolchain — see docs-requirements.txt.
          pip install -r docs-requirements.txt

      - name: Install azlin (for doc generation)
        run: |
          pip install -e .

      - name: Generate command documentation
        run: |
          python scripts/doc_sync.py --force

      - name: Build documentation
        run: |
          # mkdocs.yml already has docs_dir: docs-site configured, so just build
          mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site/

  # Deploy to GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # GitHub Pages deployment requires these scopes; granted only to this job.
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Summary
        run: |
          echo "### Documentation Deployed! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Documentation is available at: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
