name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Python source was retired in PR #810.
  # Rust checks live in rust-ci.yml (build, test, clippy).
  # This job preserves the "All CI Checks Passed" status name
  # for branch-protection rules that reference it.
  all-checks:
    name: All CI Checks Passed
    runs-on: ubuntu-24.04
    steps:
      - name: No Python checks required
        run: echo "Python source retired. See rust-ci.yml for Rust CI."
